name: Keep Modal Warm

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:  # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Modal keepalive
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ntemusejoel--echomancer-f5-tts-fastapi-app.modal.run/keepalive" \
            -H "Accept: application/json" \
            --max-time 120)
          echo "HTTP status: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "Keepalive failed with status $RESPONSE"
            exit 1
          fi
          echo "Keepalive OK"
